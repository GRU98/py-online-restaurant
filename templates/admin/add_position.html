{% extends "base.html" %}
{% block content %}
<section>
    <h2>Додавання нової позиції</h2>
    {% include '_admin_navigation.html' %}
    <form method="post" enctype="multipart/form-data" class="form-grid" style="max-width: 600px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
            <label for="name">Назва</label>
            <input id="name" type="text" name="name" required>
        </div>
        <div>
            <label for="ingredients">Інгредієнти</label>
            <textarea id="ingredients" name="ingredients" rows="3" required></textarea>
        </div>
        <div>
            <label for="description">Опис</label>
            <textarea id="description" name="description" rows="3" required></textarea>
        </div>
        <div>
            <label for="price">Ціна (грн)</label>
            <input id="price" type="number" step="0.01" name="price" required>
        </div>
        <div>
            <label for="weight">Вага (г)</label>
            <input id="weight" type="number" name="weight" required>
        </div>
        <div>
            <label for="category">Категорія</label>
            <select id="category" name="category" required>
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="img">Зображення</label>
            <input id="img" type="file" name="img" accept=".png,.jpg,.jpeg,.gif,.webp" required>
        </div>
        <div>
            <button type="submit">Додати позицію</button>
        </div>
    </form>
</section>
{% endblock %}
