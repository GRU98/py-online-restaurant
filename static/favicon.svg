<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C0C12"/>
      <stop offset="100%" stop-color="#06060A"/>
    </linearGradient>
    <linearGradient id="gold" x1="10" y1="14" x2="54" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4BA7A"/>
      <stop offset="100%" stop-color="#A08840"/>
    </linearGradient>
    <linearGradient id="bun" x1="32" y1="16" x2="32" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4BA7A"/>
      <stop offset="100%" stop-color="#B89545"/>
    </linearGradient>
    <linearGradient id="glow" x1="32" y1="20" x2="32" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C6A75E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C6A75E" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <ellipse cx="32" cy="36" rx="22" ry="18" fill="url(#glow)"/>
  <!-- Top bun — rounded dome -->
  <path d="M15 30 Q15 16 32 16 Q49 16 49 30 Z" fill="none" stroke="url(#bun)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Sesame seeds on top bun -->
  <ellipse cx="26" cy="21" rx="1.8" ry="1" fill="#C6A75E" opacity="0.5" transform="rotate(-20 26 21)"/>
  <ellipse cx="35" cy="19" rx="1.8" ry="1" fill="#C6A75E" opacity="0.4" transform="rotate(15 35 19)"/>
  <ellipse cx="40" cy="23" rx="1.5" ry="0.8" fill="#C6A75E" opacity="0.35" transform="rotate(-10 40 23)"/>
  <!-- Lettuce — wavy line -->
  <path d="M13 32 Q17 29 21 32 Q25 35 29 32 Q33 29 37 32 Q41 35 45 32 Q49 29 51 32" fill="none" stroke="#5A9E6F" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
  <!-- Patty -->
  <rect x="14" y="34" width="36" height="6" rx="3" fill="none" stroke="#8B5E3C" stroke-width="2" opacity="0.65"/>
  <!-- Cheese — slightly melted angle -->
  <path d="M14 40 L16 44 L48 44 L50 40" fill="none" stroke="#D4A030" stroke-width="1.8" stroke-linejoin="round" opacity="0.6"/>
  <!-- Bottom bun -->
  <path d="M15 44 Q15 50 32 50 Q49 50 49 44" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Thin border -->
  <rect x="1" y="1" width="62" height="62" rx="15" fill="none" stroke="url(#gold)" stroke-width="0.7" opacity="0.2"/>
</svg>
